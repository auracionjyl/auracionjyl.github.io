<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stimuli Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #1a1a2e;
        }

        .controls {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 1.5rem 2rem;
            max-width: 700px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem 2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .control-group label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
        }

        .control-group select {
            padding: 0.45rem 0.6rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95rem;
            background: #fafafa;
            cursor: pointer;
        }

        .control-group select:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 2px rgba(74, 108, 247, 0.2);
        }

        .btn-row {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            margin-top: 0.5rem;
        }

        #show-btn {
            padding: 0.6rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: #4a6cf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #show-btn:hover {
            background: #3a5ae0;
        }

        .display-area {
            margin-top: 2rem;
            max-width: 900px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #filename-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.75rem;
            word-break: break-all;
            text-align: center;
        }

        #stimulus-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 1.5rem;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #stimulus-container img,
        #stimulus-container video {
            max-width: 100%;
            max-height: 70vh;
            border-radius: 6px;
        }

        .not-found {
            font-size: 1.1rem;
            color: #999;
            text-align: center;
            padding: 2rem;
        }

        @media (max-width: 500px) {
            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <h1>Stimuli Viewer</h1>

    <div class="controls">
        <div class="control-group">
            <label for="sel-noise">Noise</label>
            <select id="sel-noise">
                <option value="wonoise">Without Noise</option>
                <option value="noise">With Noise</option>
            </select>
        </div>

        <div class="control-group">
            <label for="sel-jitter">Jitter</label>
            <select id="sel-jitter">
                <option value="wojitter">No Jitter</option>
                <option value="jitter1">Jitter 1</option>
                <option value="jitter2">Jitter 2</option>
            </select>
        </div>

        <div class="control-group">
            <label for="sel-blur">Blur</label>
            <select id="sel-blur">
                <option value="woblur">Without Blur</option>
                <option value="blur">With Blur</option>
            </select>
        </div>

        <div class="control-group">
            <label for="sel-res">Resolution</label>
            <select id="sel-res">
                <option value="res30">30 ppd</option>
                <option value="res45">45 ppd</option>
                <option value="res90">90 ppd</option>
            </select>
        </div>

        <div class="control-group">
            <label for="sel-fs">Font Size</label>
            <select id="sel-fs">
                <option value="fs12">12 arcmin</option>
                <option value="fs15">15 arcmin</option>
                <option value="fs18">18 arcmin</option>
                <option value="fs24">24 arcmin</option>
            </select>
        </div>

        <div class="btn-row">
            <button id="show-btn">Show Stimuli</button>
        </div>
    </div>

    <div class="display-area">
        <div id="filename-info"></div>
        <div id="stimulus-container"></div>
    </div>

    <script>
        document.getElementById('show-btn').addEventListener('click', function () {
            var noise = document.getElementById('sel-noise').value;
            var jitter = document.getElementById('sel-jitter').value;
            var blur = document.getElementById('sel-blur').value;
            var res = document.getElementById('sel-res').value;
            var fs = document.getElementById('sel-fs').value;

            var isVideo = jitter !== 'wojitter';
            var ext = isVideo ? '.mp4' : '.png';

            // Build filename: {noise}_{jitter}_{blur}_{res}_{fs}.ext
            var filename = noise + '_' + jitter + '_' + blur + '_' + res + '_' + fs + ext;
            var path = 'data/' + filename;

            var container = document.getElementById('stimulus-container');
            var info = document.getElementById('filename-info');
            info.textContent = 'Looking for: ' + filename;
            container.innerHTML = '';

            if (isVideo) {
                var video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                var source = document.createElement('source');
                source.src = path;
                source.type = 'video/mp4';
                video.appendChild(source);
                video.onerror = function () {
                    container.innerHTML = '<div class="not-found">No such stimuli.<br><small>' + filename + ' not found in data/</small></div>';
                };
                container.appendChild(video);
            } else {
                var img = document.createElement('img');
                img.src = path;
                img.alt = 'Stimulus: ' + filename;
                img.onerror = function () {
                    // Try the double-underscore variant (wojitter__blur pattern)
                    var altFilename = noise + '_' + jitter + '__' + blur + '_' + res + '_' + fs + ext;
                    var altPath = 'data/' + altFilename;
                    var img2 = document.createElement('img');
                    img2.src = altPath;
                    img2.alt = 'Stimulus: ' + altFilename;
                    img2.onerror = function () {
                        container.innerHTML = '<div class="not-found">No such stimuli.<br><small>' + filename + ' not found in data/</small></div>';
                    };
                    container.innerHTML = '';
                    container.appendChild(img2);
                    info.textContent = 'Looking for: ' + altFilename;
                };
                container.appendChild(img);
            }
        });
    </script>
</body>
</html>
