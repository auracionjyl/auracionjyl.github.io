<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stimuli Viewer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            height: 100vh;
            overflow: hidden;
        }

        .page-layout {
            display: flex;
            height: 100vh;
        }

        /* Left sidebar with controls */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: #fff;
            border-right: 1px solid #e0e0e0;
            padding: 1.2rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            overflow-y: auto;
        }

        .sidebar h1 {
            font-size: 1.2rem;
            color: #1a1a2e;
            margin-bottom: 0.2rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .control-group label {
            font-weight: 600;
            font-size: 0.8rem;
            color: #555;
        }

        .control-group select {
            padding: 0.4rem 0.5rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.9rem;
            background: #fafafa;
            cursor: pointer;
            width: 100%;
        }

        .control-group select:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 2px rgba(74, 108, 247, 0.2);
        }

        .toggle-btns {
            display: flex;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #ccc;
        }

        .toggle-btns input[type="radio"] {
            display: none;
        }

        .toggle-btns label {
            flex: 1;
            padding: 0.35rem 0.5rem;
            font-size: 0.78rem;
            font-weight: 500;
            color: #555;
            background: #fafafa;
            cursor: pointer;
            border-right: 1px solid #ccc;
            transition: background 0.15s, color 0.15s;
            user-select: none;
            text-align: center;
        }

        .toggle-btns label:last-of-type {
            border-right: none;
        }

        .toggle-btns input[type="radio"]:checked + label {
            background: #4a6cf7;
            color: #fff;
        }

        #show-btn {
            padding: 0.55rem 1rem;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: #4a6cf7;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
            margin-top: 0.3rem;
        }

        #show-btn:hover {
            background: #3a5ae0;
        }

        /* Right display area */
        .display-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            overflow: auto;
        }

        #filename-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 0.5rem;
            word-break: break-all;
            text-align: center;
        }

        #stimulus-container {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        #stimulus-container img,
        #stimulus-container video {
            max-width: 100%;
            max-height: calc(100vh - 100px);
            border-radius: 6px;
        }

        /* Center-crop canvas */
        #stimulus-container canvas {
            border-radius: 6px;
            display: block;
        }

        /* Center-crop wrapper for video: fixed 1000x1000 window */
        .crop-wrapper {
            width: 1000px;
            height: 1000px;
            overflow: hidden;
            position: relative;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .crop-wrapper video {
            position: absolute;
            max-width: none !important;
            max-height: none !important;
            border-radius: 0;
        }

        .not-found {
            font-size: 1.1rem;
            color: #999;
            text-align: center;
            padding: 2rem;
        }

        /* Responsive: stack on narrow screens */
        @media (max-width: 700px) {
            .page-layout {
                flex-direction: column;
                height: auto;
            }

            body {
                height: auto;
                overflow: auto;
            }

            .sidebar {
                width: 100%;
                min-width: unset;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
            }

            .display-area {
                min-height: 50vh;
            }
        }
    </style>
</head>
<body>
    <div class="page-layout">
        <div class="sidebar">
            <h1>Stimuli Viewer</h1>

            <div class="control-group">
                <label for="sel-noise">Noise</label>
                <select id="sel-noise">
                    <option value="wonoise">Without Noise</option>
                    <option value="noise">With Noise</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sel-jitter">Jitter</label>
                <select id="sel-jitter">
                    <option value="wojitter">No Jitter</option>
                    <option value="jitter1">Jitter 1</option>
                    <option value="jitter2">Jitter 2</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sel-blur">Blur</label>
                <select id="sel-blur">
                    <option value="woblur">Without Blur</option>
                    <option value="blur">With Blur</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sel-res">Resolution</label>
                <select id="sel-res">
                    <option value="res30">30 ppd</option>
                    <option value="res45">45 ppd</option>
                    <option value="res90">90 ppd</option>
                </select>
            </div>

            <div class="control-group">
                <label for="sel-fs">Font Size</label>
                <select id="sel-fs">
                    <option value="fs12">12 arcmin</option>
                    <option value="fs15">15 arcmin</option>
                    <option value="fs18">18 arcmin</option>
                    <option value="fs24">24 arcmin</option>
                </select>
            </div>

            <div class="control-group">
                <label>View Mode</label>
                <div class="toggle-btns">
                    <input type="radio" name="view-mode" id="mode-full" value="full" checked>
                    <label for="mode-full">Full Image</label>
                    <input type="radio" name="view-mode" id="mode-center" value="center">
                    <label for="mode-center">Center 1000&times;1000</label>
                </div>
            </div>

            <button id="show-btn">Show Stimuli</button>
        </div>

        <div class="display-area">
            <div id="filename-info"></div>
            <div id="stimulus-container"></div>
        </div>
    </div>

    <script>
        function getViewMode() {
            return document.querySelector('input[name="view-mode"]:checked').value;
        }

        var CROP = 1000;

        // For images: draw the center 1000x1000 onto a canvas
        function showImageCropped(imgEl, container) {
            var w = imgEl.naturalWidth;
            var h = imgEl.naturalHeight;
            var canvas = document.createElement('canvas');
            canvas.width = CROP;
            canvas.height = CROP;
            var ctx = canvas.getContext('2d');
            var sx = Math.max(0, (w - CROP) / 2);
            var sy = Math.max(0, (h - CROP) / 2);
            var sw = Math.min(w, CROP);
            var sh = Math.min(h, CROP);
            var dx = Math.max(0, (CROP - w) / 2);
            var dy = Math.max(0, (CROP - h) / 2);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, CROP, CROP);
            ctx.drawImage(imgEl, sx, sy, sw, sh, dx, dy, sw, sh);
            container.innerHTML = '';
            container.appendChild(canvas);
        }

        // For videos: wrap in a 1000x1000 clipping div, position video so center is visible
        function showVideoCropped(videoEl, container) {
            var wrapper = document.createElement('div');
            wrapper.className = 'crop-wrapper';

            videoEl.addEventListener('loadedmetadata', function () {
                var vw = videoEl.videoWidth;
                var vh = videoEl.videoHeight;
                videoEl.style.width = vw + 'px';
                videoEl.style.height = vh + 'px';
                videoEl.style.left = ((CROP - vw) / 2) + 'px';
                videoEl.style.top = ((CROP - vh) / 2) + 'px';
            });

            wrapper.appendChild(videoEl);
            container.innerHTML = '';
            container.appendChild(wrapper);
        }

        function showNotFound(container, filename) {
            container.innerHTML = '<div class="not-found">No such stimuli.<br><small>' + filename + ' not found in data/</small></div>';
        }

        document.getElementById('show-btn').addEventListener('click', function () {
            var noise = document.getElementById('sel-noise').value;
            var jitter = document.getElementById('sel-jitter').value;
            var blur = document.getElementById('sel-blur').value;
            var res = document.getElementById('sel-res').value;
            var fs = document.getElementById('sel-fs').value;
            var viewMode = getViewMode();

            var isVideo = jitter !== 'wojitter';
            var ext = isVideo ? '.mp4' : '.png';

            var filename = noise + '_' + jitter + '_' + blur + '_' + res + '_' + fs + ext;
            var path = 'data/' + filename;

            var container = document.getElementById('stimulus-container');
            var info = document.getElementById('filename-info');
            var modeLabel = viewMode === 'center' ? '  (center 1000\u00d71000 crop)' : '  (full)';
            info.textContent = 'Looking for: ' + filename + modeLabel;
            container.innerHTML = '';

            if (isVideo) {
                var video = document.createElement('video');
                video.controls = true;
                video.autoplay = true;
                video.loop = true;
                video.muted = true;
                var source = document.createElement('source');
                source.src = path;
                source.type = 'video/mp4';
                video.appendChild(source);
                video.onerror = function () {
                    showNotFound(container, filename);
                };
                if (viewMode === 'center') {
                    showVideoCropped(video, container);
                } else {
                    container.appendChild(video);
                }
            } else {
                var loader = new Image();
                loader.onload = function () {
                    if (viewMode === 'center') {
                        showImageCropped(loader, container);
                    } else {
                        var img = document.createElement('img');
                        img.src = loader.src;
                        img.alt = 'Stimulus';
                        container.innerHTML = '';
                        container.appendChild(img);
                    }
                };
                loader.onerror = function () {
                    var altFilename = noise + '_' + jitter + '__' + blur + '_' + res + '_' + fs + ext;
                    var altPath = 'data/' + altFilename;
                    var loader2 = new Image();
                    loader2.onload = function () {
                        if (viewMode === 'center') {
                            showImageCropped(loader2, container);
                        } else {
                            var img2 = document.createElement('img');
                            img2.src = loader2.src;
                            img2.alt = 'Stimulus';
                            container.innerHTML = '';
                            container.appendChild(img2);
                        }
                        info.textContent = 'Looking for: ' + altFilename + modeLabel;
                    };
                    loader2.onerror = function () {
                        showNotFound(container, filename);
                    };
                    loader2.src = altPath;
                };
                loader.src = path;
            }
        });
    </script>
</body>
</html>
