<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stimuli Rater</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 210px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-top {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-top h1 {
            font-size: 1rem;
            color: #1e293b;
            margin-bottom: 0.3rem;
            font-weight: 700;
        }

        .back-link {
            font-size: 0.75rem;
            color: #4a6cf7;
            text-decoration: none;
        }

        .back-link:hover { text-decoration: underline; }

        .nav-area {
            padding: 0.6rem 0.75rem;
            display: flex;
            gap: 0.4rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .nav-btn {
            flex: 1;
            padding: 0.38rem 0.2rem;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1.5px solid #4a6cf7;
            border-radius: 6px;
            background: #fff;
            color: #4a6cf7;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #4a6cf7;
            color: #fff;
        }

        .nav-btn:disabled {
            border-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .id-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.3rem 0;
        }

        .id-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.42rem 1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.1s;
            font-size: 0.82rem;
            color: #475569;
        }

        .id-item:hover { background: #f0f4ff; }

        .id-item.active {
            background: #eef1ff;
            border-left-color: #4a6cf7;
            color: #4a6cf7;
            font-weight: 600;
        }

        .rated-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
        }

        /* ===== PAGE NAV (inside sidebar) ===== */
        .page-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 0.75rem;
            border-bottom: 1px solid #e2e8f0;
            gap: 0.3rem;
        }

        .page-nav-btn {
            padding: 0.22rem 0.55rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            background: #fff;
            color: #475569;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            line-height: 1;
        }

        .page-nav-btn:hover:not(:disabled) {
            background: #4a6cf7;
            color: #fff;
            border-color: #4a6cf7;
        }

        .page-nav-btn:disabled {
            color: #cbd5e1;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .page-indicator {
            font-size: 0.72rem;
            color: #94a3b8;
            white-space: nowrap;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .page-title {
            font-size: 0.85rem;
            color: #64748b;
        }

        .page-title strong {
            font-size: 1.15rem;
            color: #1e293b;
            font-weight: 700;
        }

        /* ===== CARDS ===== */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
            padding: 1.5rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        /* ===== STIMULUS SECTIONS ===== */
        .stim-section + .stim-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .stim-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            margin-bottom: 0.35rem;
        }

        .stim-text {
            font-size: 0.95rem;
            line-height: 1.68;
            color: #1e293b;
        }

        .answer-badge {
            display: inline-block;
            padding: 0.12rem 0.45rem;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .badge-t { background: #dcfce7; color: #15803d; }
        .badge-f { background: #fee2e2; color: #b91c1c; }

        .target-word {
            display: inline-block;
            background: #fef9c3;
            border: 1px solid #fde68a;
            border-radius: 4px;
            padding: 0.1rem 0.5rem;
            font-weight: 700;
            font-size: 1rem;
        }

        .word-meta {
            display: inline-block;
            font-size: 0.78rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .word-meta-present { color: #16a34a; }
        .word-meta-absent  { color: #dc2626; }

        /* ===== RATING ===== */
        .hint-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .rating-rows {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .rating-lbl {
            width: 175px;
            flex-shrink: 0;
            font-size: 0.85rem;
            color: #475569;
        }

        .stars {
            display: flex;
            gap: 2px;
            cursor: pointer;
        }

        .star {
            font-size: 1.65rem;
            color: #e2e8f0;
            transition: color 0.07s, transform 0.07s;
            user-select: none;
            line-height: 1;
        }

        .star.lit { color: #f59e0b; }
        .star:hover { transform: scale(1.12); }

        .rating-val {
            font-size: 0.8rem;
            color: #94a3b8;
            min-width: 52px;
        }

        .submit-btn {
            margin-top: 1.1rem;
            padding: 0.55rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            background: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .submit-btn:hover:not(:disabled) { background: #3a5ae0; }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .submit-msg {
            margin-top: 0.5rem;
            font-size: 0.82rem;
            color: #16a34a;
            font-weight: 500;
            min-height: 1.1em;
        }

        /* ===== HISTORY ===== */
        .hist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.4rem;
        }

        .hist-item-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #94a3b8;
            margin-bottom: 0.55rem;
        }

        .hist-avg {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            margin-bottom: 0.2rem;
        }

        .hist-avg-val {
            font-size: 1.55rem;
            font-weight: 800;
            color: #f59e0b;
            line-height: 1;
        }

        .hist-avg-max {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .hist-count {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.6rem;
        }

        .hist-stars-row {
            display: flex;
            gap: 2px;
            margin-bottom: 0.75rem;
        }

        .hist-star { font-size: 1rem; }
        .hist-star.lit { color: #f59e0b; }
        .hist-star:not(.lit) { color: #e2e8f0; }

        .distrib { display: flex; flex-direction: column; gap: 4px; }

        .distrib-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
        }

        .distrib-star-lbl {
            width: 14px;
            color: #94a3b8;
            text-align: right;
            flex-shrink: 0;
        }

        .distrib-track {
            flex: 1;
            height: 8px;
            background: #f1f5f9;
            border-radius: 4px;
            overflow: hidden;
        }

        .distrib-fill {
            height: 100%;
            background: #f59e0b;
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .distrib-n {
            width: 20px;
            color: #94a3b8;
            text-align: left;
            font-size: 0.7rem;
        }

        .hist-empty {
            font-size: 0.82rem;
            color: #94a3b8;
            font-style: italic;
        }

        /* ===== EDITION ADVICE ===== */
        .rating-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .rating-group + .rating-group {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #f1f5f9;
        }

        .advice-label {
            font-size: 0.72rem;
            color: #94a3b8;
            font-style: italic;
            padding-left: 175px;
        }

        .advice-input {
            width: 100%;
            min-height: 56px;
            padding: 0.45rem 0.65rem;
            font-size: 0.82rem;
            font-family: inherit;
            color: #334155;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 7px;
            resize: vertical;
            transition: border-color 0.15s;
            line-height: 1.5;
        }

        .advice-input:focus {
            outline: none;
            border-color: #4a6cf7;
            background: #fff;
        }

        .advice-input::placeholder { color: #cbd5e1; }

        /* ===== OTHERS' NOTES (inline) ===== */
        .others-notes { margin-top: 0.4rem; }

        .others-notes-header {
            font-size: 0.72rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.3rem;
        }

        .others-note-item {
            font-size: 0.82rem;
            color: #334155;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: 6px;
            padding: 0.32rem 0.6rem;
            margin-bottom: 0.25rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ===== NOTES HISTORY ===== */
        .notes-section {
            margin-top: 1.1rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .notes-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #94a3b8;
            margin-bottom: 0.6rem;
        }

        .note-entry {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            margin-bottom: 0.55rem;
        }

        .note-cat {
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .note-text {
            font-size: 0.82rem;
            color: #334155;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 0.35rem 0.6rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        /* ===== CLEAR BUTTON ===== */
        .sidebar-footer {
            padding: 0.6rem 0.75rem;
            border-top: 1px solid #e2e8f0;
        }

        .clear-btn {
            width: 100%;
            padding: 0.38rem 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        .clear-btn:hover {
            color: #dc2626;
            border-color: #fca5a5;
            background: #fff5f5;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 720px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e2e8f0; }
            .id-list { max-height: 180px; }
            .main { padding: 1rem; }
            .hist-grid { grid-template-columns: 1fr; }
            .rating-lbl { width: 100%; }
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-top">
        <h1>Stimuli Rater</h1>
        <a class="back-link" href="stimuli-viewer.html">&#8592; Stimuli Viewer</a>
    </div>
    <div class="nav-area">
        <button class="nav-btn" id="prev-btn">&#8592; Prev</button>
        <button class="nav-btn" id="next-btn">Next &#8594;</button>
    </div>
    <div class="page-nav">
        <button class="page-nav-btn" id="page-prev-btn">&#8592;</button>
        <span class="page-indicator" id="page-indicator"></span>
        <button class="page-nav-btn" id="page-next-btn">&#8594;</button>
    </div>
    <div class="id-list" id="id-list"></div>
    <div class="sidebar-footer">
        <button class="clear-btn" id="clear-btn">&#x1F5D1; Clear All Ratings</button>
    </div>
</aside>

<main class="main" id="main">
    <div style="color:#94a3b8;padding:3rem;text-align:center">Loading&#8230;</div>
</main>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURATION — fill in before deploying
   ═══════════════════════════════════════════════════════════════
   This is a SEPARATE database from fixation-trial.html.

   1. In your Supabase project SQL editor, run:

      CREATE TABLE public.stimuli_ratings (
        id           uuid        DEFAULT gen_random_uuid() PRIMARY KEY,
        submitted_at timestamptz DEFAULT now(),
        ip_address   text,
        stimulus_id  int,
        story        int,
        q1           int,
        q2           int,
        q3           int,
        q4           int,
        story_note   text,
        q1_note      text,
        q2_note      text,
        q3_note      text,
        q4_note      text
      );

      ALTER TABLE public.stimuli_ratings ENABLE ROW LEVEL SECURITY;

      CREATE POLICY "allow_insert"
        ON public.stimuli_ratings FOR INSERT WITH CHECK (true);

      -- Required for cross-browser history display
      CREATE POLICY "allow_select"
        ON public.stimuli_ratings FOR SELECT USING (true);

      -- Required for password-protected wipe
      CREATE POLICY "allow_delete"
        ON public.stimuli_ratings FOR DELETE USING (true);

   2. Paste your Project URL and anon/public key below.
   ═══════════════════════════════════════════════════════════════ */
var RATING_SUPABASE_URL  = 'https://bptunbdbdjktsvkjnklk.supabase.co';
var RATING_SUPABASE_KEY  = 'sb_publishable_t_m6yogNsCI5d3mM1PO1hg_n3qfOjn1';
var RATING_TABLE         = 'stimuli_ratings';
/* ═══════════════════════════════════════════════════════════════ */

(function () {
    'use strict';

    /* ------------------------------------------------------------------ */
    /* Story files — loaded from ./stories/ at startup                     */
    /* ------------------------------------------------------------------ */
    var STORY_FILES = (function () {
        var files = [];
        for (var i = 1; i <= 28; i++) {
            files.push('./stories/stories_' + String(i).padStart(3, '0') + '.json');
        }
        return files;
    })();

    var STIMULI = {};   /* keyed by numeric ID */
    var SORTED_IDS = [];
    var TOTAL = 0;
    var PAGE_SIZE = 20;

    /* Cache client IP once — reused on every rating submission */
    var _clientIP = 'unknown';
    fetch('https://api64.ipify.org?format=json')
        .then(function (r) { return r.json(); })
        .then(function (d) { _clientIP = d.ip || 'unknown'; })
        .catch(function () {});

    /* Remote ratings cache — populated from Supabase, keyed by stimulus_id string */
    var _remoteRatings = {};

    function loadRemoteRatings(callback) {
        if (RATING_SUPABASE_URL === 'YOUR_SUPABASE_URL') return;
        fetch(RATING_SUPABASE_URL + '/rest/v1/' + RATING_TABLE +
              '?select=stimulus_id,story,q1,q2,q3,q4,story_note,q1_note,q2_note,q3_note,q4_note&limit=10000', {
            headers: {
                'apikey':        RATING_SUPABASE_KEY,
                'Authorization': 'Bearer ' + RATING_SUPABASE_KEY
            }
        })
        .then(function (r) { return r.json(); })
        .then(function (rows) {
            _remoteRatings = {};
            rows.forEach(function (row) {
                var key = String(row.stimulus_id);
                if (!_remoteRatings[key]) _remoteRatings[key] = {
                    story: [], q1: [], q2: [], q3: [], q4: [],
                    story_note: [], q1_note: [], q2_note: [], q3_note: [], q4_note: []
                };
                if (row.story      != null) _remoteRatings[key].story.push(row.story);
                if (row.q1         != null) _remoteRatings[key].q1.push(row.q1);
                if (row.q2         != null) _remoteRatings[key].q2.push(row.q2);
                if (row.q3         != null) _remoteRatings[key].q3.push(row.q3);
                if (row.q4         != null) _remoteRatings[key].q4.push(row.q4);
                if (row.story_note) _remoteRatings[key].story_note.push(row.story_note);
                if (row.q1_note)    _remoteRatings[key].q1_note.push(row.q1_note);
                if (row.q2_note)    _remoteRatings[key].q2_note.push(row.q2_note);
                if (row.q3_note)    _remoteRatings[key].q3_note.push(row.q3_note);
                if (row.q4_note)    _remoteRatings[key].q4_note.push(row.q4_note);
            });
            if (callback) callback();
        })
        .catch(function (e) { console.warn('Failed to load remote ratings:', e); });
    }

    /* Single mutable objects shared across widgets */
    var pending      = { story: 0,  q1: 0,  q2: 0,  q3: 0,  q4: 0  };
    var pendingNotes = { story: '', q1: '', q2: '', q3: '', q4: '' };
    var currentId = null;
    var currentPage = 1;

    /* ------------------------------------------------------------------ */
    /* localStorage helpers                                                 */
    /* ------------------------------------------------------------------ */
    function getAllRatings() {
        try { return JSON.parse(localStorage.getItem('stimuliRatings') || '{}'); }
        catch (e) { return {}; }
    }

    function getRatingsFor(id) {
        var key = String(id);
        /* Prefer remote (cross-browser) data; fall back to localStorage */
        if (Object.keys(_remoteRatings).length > 0) {
            var r = _remoteRatings[key] || {};
            return {
                story: r.story || [], q1: r.q1 || [], q2: r.q2 || [], q3: r.q3 || [], q4: r.q4 || [],
                story_note: r.story_note || [], q1_note: r.q1_note || [],
                q2_note: r.q2_note || [], q3_note: r.q3_note || [], q4_note: r.q4_note || []
            };
        }
        var all = getAllRatings();
        var local = all[key] || {};
        return {
            story: local.story || [], q1: local.q1 || [], q2: local.q2 || [], q3: local.q3 || [], q4: local.q4 || [],
            story_note: local.story_note || [], q1_note: local.q1_note || [],
            q2_note: local.q2_note || [], q3_note: local.q3_note || [], q4_note: local.q4_note || []
        };
    }

    function isRated(id) {
        var key = String(id);
        /* Check remote cache first, then localStorage */
        var remote = _remoteRatings[key] || {};
        if ((remote.story || []).length > 0) return true;
        var all = getAllRatings();
        var local = all[key] || {};
        return (local.story || []).length > 0;
    }

    function submitRating(id, sv, q1v, q2v, q3v, q4v, notes) {
        var all = getAllRatings();
        var key = String(id);
        var KEYS = ['story', 'q1', 'q2', 'q3', 'q4', 'story_note', 'q1_note', 'q2_note', 'q3_note', 'q4_note'];
        if (!all[key]) all[key] = {};
        KEYS.forEach(function (k) { if (!all[key][k]) all[key][k] = []; });
        all[key].story.push(sv);
        all[key].q1.push(q1v);
        all[key].q2.push(q2v);
        all[key].q3.push(q3v);
        all[key].q4.push(q4v);
        all[key].story_note.push(notes.story);
        all[key].q1_note.push(notes.q1);
        all[key].q2_note.push(notes.q2);
        all[key].q3_note.push(notes.q3);
        all[key].q4_note.push(notes.q4);
        localStorage.setItem('stimuliRatings', JSON.stringify(all));

        /* Optimistically update remote cache so history reflects instantly */
        var _key = String(id);
        if (!_remoteRatings[_key]) _remoteRatings[_key] = {
            story: [], q1: [], q2: [], q3: [], q4: [],
            story_note: [], q1_note: [], q2_note: [], q3_note: [], q4_note: []
        };
        _remoteRatings[_key].story.push(sv);
        _remoteRatings[_key].q1.push(q1v);
        _remoteRatings[_key].q2.push(q2v);
        _remoteRatings[_key].q3.push(q3v);
        _remoteRatings[_key].q4.push(q4v);
        if (notes.story) _remoteRatings[_key].story_note.push(notes.story);
        if (notes.q1)    _remoteRatings[_key].q1_note.push(notes.q1);
        if (notes.q2)    _remoteRatings[_key].q2_note.push(notes.q2);
        if (notes.q3)    _remoteRatings[_key].q3_note.push(notes.q3);
        if (notes.q4)    _remoteRatings[_key].q4_note.push(notes.q4);

        /* Fire-and-forget: save to Supabase (independent of localStorage) */
        if (RATING_SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            var payload = {
                ip_address:  _clientIP,
                stimulus_id: id,
                story:       sv,
                q1:          q1v,
                q2:          q2v,
                q3:          q3v,
                q4:          q4v
            };
            if (notes.story) payload.story_note = notes.story;
            if (notes.q1)    payload.q1_note    = notes.q1;
            if (notes.q2)    payload.q2_note    = notes.q2;
            if (notes.q3)    payload.q3_note    = notes.q3;
            if (notes.q4)    payload.q4_note    = notes.q4;
            fetch(RATING_SUPABASE_URL + '/rest/v1/' + RATING_TABLE, {
                method: 'POST',
                headers: {
                    'Content-Type':  'application/json',
                    'apikey':         RATING_SUPABASE_KEY,
                    'Authorization': 'Bearer ' + RATING_SUPABASE_KEY,
                    'Prefer':        'return=minimal'
                },
                body: JSON.stringify(payload)
            }).catch(function (e) { console.warn('Supabase save failed:', e); });
        }
    }

    /* Average of all ratings across all five categories for one stimulus */
    function getOverallAvg(id) {
        var r = getRatingsFor(id);
        var all = r.story.concat(r.q1).concat(r.q2).concat(r.q3).concat(r.q4);
        if (all.length === 0) return null;
        return all.reduce(function (a, b) { return a + b; }, 0) / all.length;
    }

    /* Map average 1-5 to a color */
    function avgToColor(avg) {
        if (avg === null) return null;
        if (avg >= 4)   return '#16a34a'; /* green  */
        if (avg >= 3)   return '#ca8a04'; /* amber  */
        if (avg >= 2)   return '#ea580c'; /* orange */
        return '#dc2626';                 /* red    */
    }

    function totalPages() {
        return Math.ceil(TOTAL / PAGE_SIZE);
    }

    /* ------------------------------------------------------------------ */
    /* Sidebar ID list + page navigation                                    */
    /* ------------------------------------------------------------------ */
    function buildIdList() {
        var tp = totalPages();
        var pageStart = (currentPage - 1) * PAGE_SIZE;
        var pageEnd   = Math.min(currentPage * PAGE_SIZE, TOTAL);

        /* Update page indicator and page nav buttons */
        document.getElementById('page-indicator').textContent =
            'Page ' + currentPage + ' / ' + tp;
        document.getElementById('page-prev-btn').disabled = currentPage <= 1;
        document.getElementById('page-next-btn').disabled = currentPage >= tp;

        /* Build the visible items from SORTED_IDS */
        var list = document.getElementById('id-list');
        list.innerHTML = '';
        for (var i = pageStart; i < pageEnd; i++) {
            (function (id) {
                var item = document.createElement('div');
                item.className = 'id-item' + (id === currentId ? ' active' : '');
                item.dataset.id = id;

                var span = document.createElement('span');
                span.textContent = 'Stimulus #' + id;

                /* Color by average difficulty */
                var avg = getOverallAvg(id);
                var color = avgToColor(avg);
                if (color) {
                    span.style.color = color;
                    if (id === currentId) item.style.borderLeftColor = color;
                }

                item.appendChild(span);

                if (isRated(id)) {
                    var dot = document.createElement('span');
                    dot.className = 'rated-dot';
                    if (color) dot.style.background = color;
                    dot.title = avg !== null
                        ? 'Avg difficulty: ' + avg.toFixed(2)
                        : 'Has ratings';
                    item.appendChild(dot);
                }

                item.addEventListener('click', function () { goTo(id); });
                list.appendChild(item);
            })(SORTED_IDS[i]);
        }

        var active = list.querySelector('.id-item.active');
        if (active) active.scrollIntoView({ block: 'nearest' });
    }

    /* ------------------------------------------------------------------ */
    /* Nav buttons                                                          */
    /* ------------------------------------------------------------------ */
    function updateNavBtns() {
        var idx = SORTED_IDS.indexOf(currentId);
        document.getElementById('prev-btn').disabled = idx <= 0;
        document.getElementById('next-btn').disabled = idx >= TOTAL - 1;
    }

    document.getElementById('prev-btn').addEventListener('click', function () {
        var idx = SORTED_IDS.indexOf(currentId);
        if (idx > 0) goTo(SORTED_IDS[idx - 1]);
    });
    document.getElementById('next-btn').addEventListener('click', function () {
        var idx = SORTED_IDS.indexOf(currentId);
        if (idx < TOTAL - 1) goTo(SORTED_IDS[idx + 1]);
    });

    document.getElementById('page-prev-btn').addEventListener('click', function () {
        if (currentPage > 1) { currentPage--; buildIdList(); }
    });
    document.getElementById('page-next-btn').addEventListener('click', function () {
        if (currentPage < totalPages()) { currentPage++; buildIdList(); }
    });

    /* ------------------------------------------------------------------ */
    /* Star widget                                                          */
    /* ------------------------------------------------------------------ */
    var LABELS = {
        story: 'Passage Difficulty',
        q1:    'Q1 Difficulty',
        q2:    'Q2 Difficulty',
        q3:    'Q3 Difficulty (word)',
        q4:    'Q4 Difficulty (word)'
    };

    var ADVICE_PLACEHOLDERS = {
        story: 'Edition advice for the passage (optional)…',
        q1:    'Edition advice for Q1 (optional)…',
        q2:    'Edition advice for Q2 word (optional)…',
        q3:    'Edition advice for Q3 word (optional)…',
        q4:    'Edition advice for Q4 word (optional)…'
    };

    function makeRatingGroup(key) {
        var group = document.createElement('div');
        group.className = 'rating-group';

        /* ---- star row ---- */
        var row = document.createElement('div');
        row.className = 'rating-row';

        var lbl = document.createElement('div');
        lbl.className = 'rating-lbl';
        lbl.textContent = LABELS[key];

        var starsEl = document.createElement('div');
        starsEl.className = 'stars';

        var valEl = document.createElement('div');
        valEl.className = 'rating-val';
        valEl.textContent = '\u2014';

        function refresh(hoverIdx) {
            var display = (hoverIdx !== undefined) ? hoverIdx : pending[key];
            starsEl.querySelectorAll('.star').forEach(function (s) {
                s.classList.toggle('lit', parseInt(s.dataset.val, 10) <= display);
            });
        }

        for (var i = 1; i <= 5; i++) {
            (function (val) {
                var s = document.createElement('span');
                s.className = 'star';
                s.dataset.val = val;
                s.textContent = '\u2605';
                s.title = val + ' / 5';
                s.addEventListener('mouseenter', function () { refresh(val); });
                s.addEventListener('mouseleave', function () { refresh(); });
                s.addEventListener('click', function () {
                    pending[key] = val;
                    refresh();
                    valEl.textContent = val + ' / 5';
                    checkSubmit();
                });
                starsEl.appendChild(s);
            })(i);
        }

        row.appendChild(lbl);
        row.appendChild(starsEl);
        row.appendChild(valEl);
        group.appendChild(row);

        /* ---- advice textarea ---- */
        var textarea = document.createElement('textarea');
        textarea.className = 'advice-input';
        textarea.id = 'note-' + key;
        textarea.placeholder = ADVICE_PLACEHOLDERS[key];
        textarea.addEventListener('input', function () {
            pendingNotes[key] = textarea.value;
        });
        group.appendChild(textarea);

        /* placeholder updated by renderInlineNotes() after remote data loads */
        var othersDiv = document.createElement('div');
        othersDiv.className = 'others-notes';
        othersDiv.id = 'others-note-' + key;
        group.appendChild(othersDiv);

        return group;
    }

    /* Fill the "others' advice" divs inside each rating group */
    function renderInlineNotes() {
        var r = getRatingsFor(currentId);
        ['story', 'q1', 'q2', 'q3', 'q4'].forEach(function (k) {
            var el = document.getElementById('others-note-' + k);
            if (!el) return;
            var notes = (r[k + '_note'] || []).filter(function (t) { return t; });
            el.innerHTML = '';
            if (notes.length === 0) return;
            var hdr = document.createElement('div');
            hdr.className = 'others-notes-header';
            hdr.textContent = notes.length === 1
                ? '1 edition advice from others:'
                : notes.length + ' edition advices from others:';
            el.appendChild(hdr);
            notes.forEach(function (txt) {
                var item = document.createElement('div');
                item.className = 'others-note-item';
                item.textContent = txt;
                el.appendChild(item);
            });
        });
    }

    function checkSubmit() {
        var btn = document.getElementById('submit-btn');
        if (btn) btn.disabled = !(pending.story && pending.q1 && pending.q2 && pending.q3 && pending.q4);
    }

    /* ------------------------------------------------------------------ */
    /* History panel                                                        */
    /* ------------------------------------------------------------------ */
    function renderHistory() {
        var el = document.getElementById('hist-content');
        if (!el) return;

        var r = getRatingsFor(currentId);
        var cats = [
            { key: 'story', label: 'Passage Difficulty' },
            { key: 'q1',    label: 'Q1 Difficulty' },
            { key: 'q2',    label: 'Q2 Difficulty' },
            { key: 'q3',    label: 'Q3 Difficulty' },
            { key: 'q4',    label: 'Q4 Difficulty' }
        ];
        var hasData = cats.some(function (c) { return r[c.key].length > 0; });

        if (!hasData) {
            el.innerHTML = '<p class="hist-empty">No ratings yet for this stimulus \u2014 be the first to rate it!</p>';
            return;
        }

        var grid = document.createElement('div');
        grid.className = 'hist-grid';

        cats.forEach(function (cat) {
            var vals = r[cat.key];
            var item = document.createElement('div');
            item.className = 'hist-item';

            var title = document.createElement('div');
            title.className = 'hist-item-title';
            title.textContent = cat.label;
            item.appendChild(title);

            if (vals.length === 0) {
                var emp = document.createElement('p');
                emp.className = 'hist-empty';
                emp.textContent = 'No ratings yet';
                item.appendChild(emp);
                grid.appendChild(item);
                return;
            }

            var mean = vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;

            /* Average */
            var avgRow = document.createElement('div');
            avgRow.className = 'hist-avg';
            var avgVal = document.createElement('div');
            avgVal.className = 'hist-avg-val';
            avgVal.textContent = mean.toFixed(2);
            var avgMax = document.createElement('div');
            avgMax.className = 'hist-avg-max';
            avgMax.textContent = '/ 5';
            avgRow.appendChild(avgVal);
            avgRow.appendChild(avgMax);
            item.appendChild(avgRow);

            /* Count */
            var cnt = document.createElement('div');
            cnt.className = 'hist-count';
            cnt.textContent = vals.length + ' rating' + (vals.length !== 1 ? 's' : '');
            item.appendChild(cnt);

            /* Visual stars for average */
            var starRow = document.createElement('div');
            starRow.className = 'hist-stars-row';
            for (var s = 1; s <= 5; s++) {
                var st = document.createElement('span');
                st.className = 'hist-star' + (s <= Math.round(mean) ? ' lit' : '');
                st.textContent = '\u2605';
                starRow.appendChild(st);
            }
            item.appendChild(starRow);

            /* Distribution */
            var dist = [0, 0, 0, 0, 0];
            vals.forEach(function (v) { if (v >= 1 && v <= 5) dist[v - 1]++; });
            var maxCnt = Math.max.apply(null, dist.concat([1]));

            var distribEl = document.createElement('div');
            distribEl.className = 'distrib';

            for (var star = 5; star >= 1; star--) {
                var dRow = document.createElement('div');
                dRow.className = 'distrib-row';

                var dLbl = document.createElement('span');
                dLbl.className = 'distrib-star-lbl';
                dLbl.textContent = star;

                var track = document.createElement('div');
                track.className = 'distrib-track';
                var fill = document.createElement('div');
                fill.className = 'distrib-fill';
                fill.style.width = (dist[star - 1] / maxCnt * 100) + '%';
                track.appendChild(fill);

                var n = document.createElement('span');
                n.className = 'distrib-n';
                n.textContent = dist[star - 1];

                dRow.appendChild(dLbl);
                dRow.appendChild(track);
                dRow.appendChild(n);
                distribEl.appendChild(dRow);
            }

            item.appendChild(distribEl);
            grid.appendChild(item);
        });

        el.innerHTML = '';
        el.appendChild(grid);

        /* Edition notes */
        var noteCats = [
            { key: 'story_note', label: 'Passage' },
            { key: 'q1_note',    label: 'Q1' },
            { key: 'q2_note',    label: 'Q2' },
            { key: 'q3_note',    label: 'Q3' },
            { key: 'q4_note',    label: 'Q4' }
        ];
        var anyNotes = noteCats.some(function (c) { return (r[c.key] || []).length > 0; });
        if (anyNotes) {
            var notesSec = document.createElement('div');
            notesSec.className = 'notes-section';
            var notesTitle = document.createElement('div');
            notesTitle.className = 'notes-section-title';
            notesTitle.textContent = 'Edition Advice';
            notesSec.appendChild(notesTitle);
            noteCats.forEach(function (c) {
                var notes = r[c.key] || [];
                notes.forEach(function (txt) {
                    if (!txt) return;
                    var entry = document.createElement('div');
                    entry.className = 'note-entry';
                    var cat = document.createElement('div');
                    cat.className = 'note-cat';
                    cat.textContent = c.label;
                    var text = document.createElement('div');
                    text.className = 'note-text';
                    text.textContent = txt;
                    entry.appendChild(cat);
                    entry.appendChild(text);
                    notesSec.appendChild(entry);
                });
            });
            el.appendChild(notesSec);
        }
    }

    /* ------------------------------------------------------------------ */
    /* HTML escape                                                          */
    /* ------------------------------------------------------------------ */
    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /* ------------------------------------------------------------------ */
    /* Render page for one stimulus                                         */
    /* ------------------------------------------------------------------ */
    function renderPage(data) {
        pending.story = 0; pending.q1 = 0; pending.q2 = 0; pending.q3 = 0; pending.q4 = 0;
        pendingNotes.story = ''; pendingNotes.q1 = ''; pendingNotes.q2 = '';
        pendingNotes.q3 = ''; pendingNotes.q4 = '';

        var main = document.getElementById('main');
        main.innerHTML = '';

        /* Header */
        var hdr = document.createElement('div');
        hdr.className = 'page-title';
        var posLabel = data.topic
            ? esc(data.topic.replace(/_/g, ' ')) + ' &nbsp;&mdash;&nbsp; '
            : '';
        hdr.innerHTML = posLabel + '<strong>Stimulus #' + data.ID + '</strong> &nbsp;of ' + TOTAL;
        main.appendChild(hdr);

        /* ---- Single combined card ---- */
        var card = document.createElement('div');
        card.className = 'card';

        var ct = document.createElement('div');
        ct.className = 'card-title';
        ct.textContent = 'Stimulus Content & Ratings';
        card.appendChild(ct);

        var hint = document.createElement('div');
        hint.className = 'hint-text';
        hint.textContent = '1 = Very Easy \u00b7 2 = Easy \u00b7 3 = Neutral \u00b7 4 = Difficult \u00b7 5 = Very Difficult';
        card.appendChild(hint);

        /* Helper: build a stim-section and append its rating group inline */
        function makeSection(labelHtml, contentHtml, ratingKey) {
            var sec = document.createElement('div');
            sec.className = 'stim-section';
            var labelDiv = document.createElement('div');
            labelDiv.className = 'stim-label';
            labelDiv.innerHTML = labelHtml;
            var contentDiv = document.createElement('div');
            contentDiv.className = 'stim-text';
            contentDiv.innerHTML = contentHtml;
            sec.appendChild(labelDiv);
            sec.appendChild(contentDiv);
            sec.appendChild(makeRatingGroup(ratingKey));
            return sec;
        }

        /* Passage */
        card.appendChild(makeSection(
            'Passage',
            esc(data.story),
            'story'
        ));

        /* Q1, Q2 — True/False */
        function tfContent(q, a) {
            return esc(q) + '<span class="answer-badge ' + (a ? 'badge-t' : 'badge-f') + '">' +
                (a ? 'True' : 'False') + '</span>';
        }

        card.appendChild(makeSection('Question 1 \u2014 True / False', tfContent(data.q1, data.a1), 'q1'));
        card.appendChild(makeSection('Question 2 \u2014 True / False', tfContent(data.q2, data.a2), 'q2'));

        /* Q3, Q4 — target words */
        function wordContent(word, present) {
            return '<span class="target-word">' + esc(word) + '</span>' +
                '<span class="word-meta ' + (present ? 'word-meta-present' : 'word-meta-absent') + '">' +
                (present ? '\u2713 appears in passage' : '\u2717 does not appear in passage') +
                '</span>';
        }

        card.appendChild(makeSection('Question 3 \u2014 Target Word', wordContent(data.q3, data.a3), 'q3'));
        card.appendChild(makeSection('Question 4 \u2014 Target Word', wordContent(data.q4, data.a4), 'q4'));

        /* Submit */
        var submitBtn = document.createElement('button');
        submitBtn.className = 'submit-btn';
        submitBtn.id = 'submit-btn';
        submitBtn.textContent = 'Submit Rating';
        submitBtn.disabled = true;

        var submitMsg = document.createElement('div');
        submitMsg.className = 'submit-msg';
        submitMsg.id = 'submit-msg';

        submitBtn.addEventListener('click', function () {
            if (!pending.story || !pending.q1 || !pending.q2 || !pending.q3 || !pending.q4) return;
            submitRating(currentId, pending.story, pending.q1, pending.q2, pending.q3, pending.q4, {
                story: pendingNotes.story, q1: pendingNotes.q1, q2: pendingNotes.q2,
                q3: pendingNotes.q3, q4: pendingNotes.q4
            });
            submitMsg.textContent = '\u2713 Rating submitted!';
            setTimeout(function () { submitMsg.textContent = ''; }, 3000);
            pending.story = 0; pending.q1 = 0; pending.q2 = 0; pending.q3 = 0; pending.q4 = 0;
            pendingNotes.story = ''; pendingNotes.q1 = ''; pendingNotes.q2 = '';
            pendingNotes.q3 = ''; pendingNotes.q4 = '';
            document.querySelectorAll('.stars .star').forEach(function (s) { s.classList.remove('lit'); });
            document.querySelectorAll('.rating-val').forEach(function (v) { v.textContent = '\u2014'; });
            document.querySelectorAll('.advice-input').forEach(function (t) { t.value = ''; });
            submitBtn.disabled = true;
            renderHistory();
            buildIdList();
        });

        card.appendChild(submitBtn);
        card.appendChild(submitMsg);
        main.appendChild(card);

        /* History card */
        var hCard = document.createElement('div');
        hCard.className = 'card';
        var ht = document.createElement('div');
        ht.className = 'card-title';
        ht.textContent = 'Rating History \u2014 Stimulus #' + data.ID;
        hCard.appendChild(ht);
        var hContent = document.createElement('div');
        hContent.id = 'hist-content';
        hCard.appendChild(hContent);
        main.appendChild(hCard);

        renderHistory();
        renderInlineNotes();
        main.scrollTop = 0;
    }

    /* ------------------------------------------------------------------ */
    /* Navigation                                                           */
    /* ------------------------------------------------------------------ */
    function goTo(id) {
        currentId = id;
        /* Auto-switch sidebar page so the active item is always visible */
        var idx = SORTED_IDS.indexOf(id);
        currentPage = Math.ceil((idx + 1) / PAGE_SIZE);
        history.replaceState(null, '', '#' + id);
        updateNavBtns();
        buildIdList();
        renderPage(STIMULI[id]);
    }

    /* Arrow-key navigation */
    document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        var idx = SORTED_IDS.indexOf(currentId);
        if (e.key === 'ArrowLeft'  && idx > 0)          goTo(SORTED_IDS[idx - 1]);
        if (e.key === 'ArrowRight' && idx < TOTAL - 1)  goTo(SORTED_IDS[idx + 1]);
    });

    /* ------------------------------------------------------------------ */
    /* Clear all ratings                                                    */
    /* ------------------------------------------------------------------ */
    document.getElementById('clear-btn').addEventListener('click', function () {
        var pwd = prompt('Enter password to clear all ratings:');
        if (pwd === null) return;
        if (pwd !== '19970902') { alert('Incorrect password.'); return; }
        if (!confirm('Delete ALL ratings and edition advices for everyone? This cannot be undone.')) return;

        /* 1. Clear localStorage */
        localStorage.removeItem('stimuliRatings');

        /* 2. Clear in-memory cache */
        _remoteRatings = {};

        /* 3. Refresh UI immediately */
        buildIdList();
        renderHistory();
        renderInlineNotes();

        /* 4. Wipe Supabase — delete all rows */
        if (RATING_SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            fetch(RATING_SUPABASE_URL + '/rest/v1/' + RATING_TABLE + '?id=not.is.null', {
                method: 'DELETE',
                headers: {
                    'apikey':        RATING_SUPABASE_KEY,
                    'Authorization': 'Bearer ' + RATING_SUPABASE_KEY
                }
            })
            .then(function (r) {
                if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
                console.log('Supabase wiped.');
            })
            .catch(function (e) { alert('Local data cleared, but Supabase wipe failed:\n' + e.message); });
        }
    });

    /* ------------------------------------------------------------------ */
    /* Load story files, then initialise                                    */
    /* ------------------------------------------------------------------ */
    function init() {
        var hash = parseInt(window.location.hash.slice(1), 10);

        Promise.all(STORY_FILES.map(function (url) {
            return fetch(url).then(function (r) { return r.json(); });
        }))
        .then(function (results) {
            results.forEach(function (arr) {
                arr.forEach(function (item) {
                    STIMULI[item.ID] = item;
                });
            });

            SORTED_IDS = Object.keys(STIMULI)
                .map(Number)
                .sort(function (a, b) { return a - b; });
            TOTAL = SORTED_IDS.length;

            var startId = (STIMULI[hash]) ? hash : SORTED_IDS[0];
            updateNavBtns();
            buildIdList();
            goTo(startId);

            /* Load remote ratings — re-render history + sidebar when ready */
            loadRemoteRatings(function () {
                buildIdList();
                renderHistory();
                renderInlineNotes();
            });
        })
        .catch(function (e) {
            document.getElementById('main').innerHTML =
                '<div style="color:#dc2626;padding:3rem;text-align:center">' +
                'Failed to load story files: ' + e.message + '</div>';
        });
    }

    init();

})();
</script>
