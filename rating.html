<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stimuli Rater</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #333;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 210px;
            flex-shrink: 0;
            background: #fff;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .sidebar-top {
            padding: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .sidebar-top h1 {
            font-size: 1rem;
            color: #1e293b;
            margin-bottom: 0.3rem;
            font-weight: 700;
        }

        .back-link {
            font-size: 0.75rem;
            color: #4a6cf7;
            text-decoration: none;
        }

        .back-link:hover { text-decoration: underline; }

        .nav-area {
            padding: 0.6rem 0.75rem;
            display: flex;
            gap: 0.4rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .nav-btn {
            flex: 1;
            padding: 0.38rem 0.2rem;
            font-size: 0.78rem;
            font-weight: 600;
            border: 1.5px solid #4a6cf7;
            border-radius: 6px;
            background: #fff;
            color: #4a6cf7;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .nav-btn:hover:not(:disabled) {
            background: #4a6cf7;
            color: #fff;
        }

        .nav-btn:disabled {
            border-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .id-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.3rem 0;
        }

        .id-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.42rem 1rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.1s;
            font-size: 0.82rem;
            color: #475569;
        }

        .id-item:hover { background: #f0f4ff; }

        .id-item.active {
            background: #eef1ff;
            border-left-color: #4a6cf7;
            color: #4a6cf7;
            font-weight: 600;
        }

        .rated-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
        }

        /* ===== PAGE NAV (inside sidebar) ===== */
        .page-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.45rem 0.75rem;
            border-bottom: 1px solid #e2e8f0;
            gap: 0.3rem;
        }

        .page-nav-btn {
            padding: 0.22rem 0.55rem;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid #cbd5e1;
            border-radius: 5px;
            background: #fff;
            color: #475569;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
            line-height: 1;
        }

        .page-nav-btn:hover:not(:disabled) {
            background: #4a6cf7;
            color: #fff;
            border-color: #4a6cf7;
        }

        .page-nav-btn:disabled {
            color: #cbd5e1;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .page-indicator {
            font-size: 0.72rem;
            color: #94a3b8;
            white-space: nowrap;
        }

        /* ===== MAIN ===== */
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .page-title {
            font-size: 0.85rem;
            color: #64748b;
        }

        .page-title strong {
            font-size: 1.15rem;
            color: #1e293b;
            font-weight: 700;
        }

        /* ===== CARDS ===== */
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 1px 6px rgba(0, 0, 0, 0.07);
            padding: 1.5rem;
        }

        .card-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        /* ===== STIMULUS SECTIONS ===== */
        .stim-section + .stim-section {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .stim-label {
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #94a3b8;
            margin-bottom: 0.35rem;
        }

        .stim-text {
            font-size: 0.95rem;
            line-height: 1.68;
            color: #1e293b;
        }

        .answer-badge {
            display: inline-block;
            padding: 0.12rem 0.45rem;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        .badge-t { background: #dcfce7; color: #15803d; }
        .badge-f { background: #fee2e2; color: #b91c1c; }

        .target-word {
            display: inline-block;
            background: #fef9c3;
            border: 1px solid #fde68a;
            border-radius: 4px;
            padding: 0.1rem 0.5rem;
            font-weight: 700;
            font-size: 1rem;
        }

        .word-meta {
            display: inline-block;
            font-size: 0.78rem;
            margin-left: 0.5rem;
            font-weight: 600;
        }

        .word-meta-present { color: #16a34a; }
        .word-meta-absent  { color: #dc2626; }

        /* ===== RATING ===== */
        .hint-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 1rem;
            font-style: italic;
        }

        .rating-rows {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .rating-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .rating-lbl {
            width: 175px;
            flex-shrink: 0;
            font-size: 0.85rem;
            color: #475569;
        }

        .stars {
            display: flex;
            gap: 2px;
            cursor: pointer;
        }

        .star {
            font-size: 1.65rem;
            color: #e2e8f0;
            transition: color 0.07s, transform 0.07s;
            user-select: none;
            line-height: 1;
        }

        .star.lit { color: #f59e0b; }
        .star:hover { transform: scale(1.12); }

        .rating-val {
            font-size: 0.8rem;
            color: #94a3b8;
            min-width: 52px;
        }

        .submit-btn {
            margin-top: 1.1rem;
            padding: 0.55rem 1.4rem;
            font-size: 0.9rem;
            font-weight: 600;
            background: #4a6cf7;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .submit-btn:hover:not(:disabled) { background: #3a5ae0; }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .submit-msg {
            margin-top: 0.5rem;
            font-size: 0.82rem;
            color: #16a34a;
            font-weight: 500;
            min-height: 1.1em;
        }

        /* ===== HISTORY ===== */
        .hist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.4rem;
        }

        .hist-item-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #94a3b8;
            margin-bottom: 0.55rem;
        }

        .hist-avg {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            margin-bottom: 0.2rem;
        }

        .hist-avg-val {
            font-size: 1.55rem;
            font-weight: 800;
            color: #f59e0b;
            line-height: 1;
        }

        .hist-avg-max {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .hist-count {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.6rem;
        }

        .hist-stars-row {
            display: flex;
            gap: 2px;
            margin-bottom: 0.75rem;
        }

        .hist-star { font-size: 1rem; }
        .hist-star.lit { color: #f59e0b; }
        .hist-star:not(.lit) { color: #e2e8f0; }

        .distrib { display: flex; flex-direction: column; gap: 4px; }

        .distrib-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
        }

        .distrib-star-lbl {
            width: 14px;
            color: #94a3b8;
            text-align: right;
            flex-shrink: 0;
        }

        .distrib-track {
            flex: 1;
            height: 8px;
            background: #f1f5f9;
            border-radius: 4px;
            overflow: hidden;
        }

        .distrib-fill {
            height: 100%;
            background: #f59e0b;
            border-radius: 4px;
            transition: width 0.4s ease;
        }

        .distrib-n {
            width: 20px;
            color: #94a3b8;
            text-align: left;
            font-size: 0.7rem;
        }

        .hist-empty {
            font-size: 0.82rem;
            color: #94a3b8;
            font-style: italic;
        }

        /* ===== CLEAR BUTTON ===== */
        .sidebar-footer {
            padding: 0.6rem 0.75rem;
            border-top: 1px solid #e2e8f0;
        }

        .clear-btn {
            width: 100%;
            padding: 0.38rem 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            background: none;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s, background 0.15s;
        }

        .clear-btn:hover {
            color: #dc2626;
            border-color: #fca5a5;
            background: #fff5f5;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 720px) {
            body { flex-direction: column; height: auto; overflow: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #e2e8f0; }
            .id-list { max-height: 180px; }
            .main { padding: 1rem; }
            .hist-grid { grid-template-columns: 1fr; }
            .rating-lbl { width: 100%; }
        }
    </style>
</head>

</aside>

<main class="main" id="main">

</main>

<script>

   2. Paste your Project URL and anon/public key below.

var RATING_TABLE         = 'stimuli_ratings';
/* ═══════════════════════════════════════════════════════════════ */

(function () {
    'use strict';

    /* ------------------------------------------------------------------ */
    /* Inline stimulus data — no fetch() needed, works on file://          */
    /* ------------------------------------------------------------------ */
    var STIMULI = {
        1:  {"ID":1,"story":"A multilateral treaty is concluded among several countries. The agreement establishes rights and obligations between each party and every other party. Multilateral treaties are often regional.[citation needed] Treaties of \"mutual guarantee\" are international compacts, e.g., the Treaty of Locarno which guarantees each signatory against attack from another.","q1":"The Treaty of Locarno guarantees each signatory state protection against attack by other signatories. (True/False?)","a1":true,"q2":"signatory","a2":true},
        2:  {"ID":2,"story":"The proportion of non-repetitive DNA is calculated by using the length of non-repetitive DNA divided by genome size. Protein-coding genes and RNA-coding genes are generally non-repetitive DNA. A bigger genome does not mean more genes, and the proportion of non-repetitive DNA decreases along with increasing genome size in higher eukaryotes.","q1":"In higher eukaryotes, the proportion of non-repetitive DNA increases as genome size grows larger. (True/False?)","a1":false,"q2":"chromosome","a2":false},
        3:  {"ID":3,"story":"An earthquake emergency relief team of 184 people (consisting of 12 people from the State Seismological Bureau, 150 from the Beijing Military Area Command, and 22 from the Armed Police General Hospital) left Beijing from Nanyuan Airport late May 12 in two military transport planes to travel to Wenchuan County.","q1":"The 184-person earthquake relief team traveled from Beijing to Wenchuan County by military transport plane. (True/False?)","a1":true,"q2":"rescue","a2":false},
        4:  {"ID":4,"story":"At a minimum, HDTV has twice the linear resolution of standard-definition television (SDTV), thus showing greater detail than either analog television or regular DVD. The technical standards for broadcasting HDTV also handle the 16:9 aspect ratio images without using letterboxing or anamorphic stretching, thus increasing the effective image resolution.","q1":"HDTV broadcast standards handle 16:9 aspect ratio images by applying letterboxing to preserve image resolution. (True/False?)","a1":false,"q2":"resolution","a2":true},
        5:  {"ID":5,"story":"Although he began his tenure as governor with record high approval ratings (as high as 89% in December 2003), he left office with a record low 23%, only one percent higher than that of Gray Davis's when he was recalled in October 2003.","q1":"Schwarzenegger's approval rating when he left office was higher than Gray Davis's approval rating at the time of Davis's recall. (True/False?)","a1":true,"q2":"election","a2":false},
        6:  {"ID":6,"story":"A HDI below 0.5 is considered to represent \"low development\". All 22 countries in that category are located in Africa. The highest-scoring Sub-Saharan countries, Gabon and South Africa, are ranked 119th and 121st, respectively. Nine countries departed from this category this year and joined the \"medium development\" group.","q1":"Countries with an HDI below 0.5 are spread across multiple continents. (True/False?)","a1":false,"q2":"Africa","a2":true},
        7:  {"ID":7,"story":"The architecture and urbanism of the Classical civilizations such as the Greek and the Roman evolved from civic ideals rather than religious or empirical ones and new building types emerged. Architectural \"style\" developed in the form of the Classical orders.","q1":"Greek and Roman classical architecture was primarily shaped by religious and empirical ideals rather than civic ones. (True/False?)","a1":false,"q2":"civic","a2":true},
        8:  {"ID":8,"story":"China's modern higher education began in 1895 with the Imperial Tientsin University which was a polytechnic plus a law department. Liberal arts were not offered until three years later at Capital University. To this day, about half of China's elite universities remain essentially polytechnical.","q1":"The Imperial Tientsin University, which launched China's modern higher education in 1895, was also the first Chinese institution to offer liberal arts courses. (True/False?)","a1":false,"q2":"polytechnic","a2":true},
        9:  {"ID":9,"story":"In addition, recording and reproducing an HDTV signal was a significant technical challenge in the early years of HDTV (Sony HDVS). Japan remained the only country with successful public broadcasting of analog HDTV, with seven broadcasters sharing a single channel.","q1":"In the early years of HDTV, Japan was the only country to achieve successful public broadcasting of analog HDTV. (True/False?)","a1":true,"q2":"satellite","a2":false},
        10: {"ID":10,"story":"Some dog breeds have acquired traits through selective breeding that interfere with reproduction. Male French Bulldogs, for instance, are incapable of mounting the female. For many dogs of this breed, the female must be artificially inseminated in order to reproduce.","q1":"Male French Bulldogs are capable of natural reproduction without human assistance. (True/False?)","a1":false,"q2":"inseminated","a2":true},
        11: {"ID":11,"story":"Some of the species of moths and insects show evidence of having been indigenous to the area from as long ago as the Alpine orogeny. In Emosson in Valais, Switzerland, dinosaur tracks were found in the 1970s, dating probably from the Triassic Period.","q1":"Dinosaur tracks discovered in Emosson, Switzerland in the 1970s are believed to date from the Triassic Period. (True/False?)","a1":true,"q2":"moths","a2":true},
        12: {"ID":12,"story":"In addition to these popular examples of house, there has also been a reunification of contemporary house and its roots. Many hip hop and R&B artists also turn to house music to add a mass appeal to the music they produce.","q1":"Hip hop and R&B artists incorporate house music into their work primarily to broaden its commercial appeal. (True/False?)","a1":true,"q2":"reunification","a2":true},
        13: {"ID":13,"story":"According to the journal DesignIntelligence, which annually publishes \"America's Best Architecture and Design Schools,\" the School of Architecture and Urban Design at the University of Kansas was named the best in the Midwest and ranked 11th among all undergraduate architecture programs in the U.S in 2012.","q1":"In 2012, DesignIntelligence ranked the University of Kansas School of Architecture as the top undergraduate architecture program in the United States. (True/False?)","a1":false,"q2":"accreditation","a2":false},
        14: {"ID":14,"story":"The finalists were Cook and Archuleta. David Cook was announced the winner on May 21, 2008, the first rocker to win the show. Both Cook and Archuleta had some success as recording artists with both selling over a million albums in the U.S.","q1":"David Cook, announced the winner of American Idol on May 21, 2008, was the first rocker to win the competition. (True/False?)","a1":true,"q2":"rocker","a2":true},
        15: {"ID":15,"story":"Thomas Jefferson observed a tendency for \"The functionaries of every government ... to command at will the liberty and property of their constituents. There is no safe deposit [for liberty and property] ... without information. Where the press is free, and every man able to read, all is safe.\"","q1":"Thomas Jefferson believed that a free press combined with widespread literacy is sufficient to safeguard liberty and property. (True/False?)","a1":true,"q2":"press","a2":true},
        16: {"ID":16,"story":"Hydrogen is commonly used in power stations as a coolant in generators due to a number of favorable properties that are a direct result of its light diatomic molecules. These include low density, low viscosity, and the highest specific heat and thermal conductivity of all gases.","q1":"Hydrogen is favored as a coolant in power station generators in part because of its high density. (True/False?)","a1":false,"q2":"reactor","a2":false},
        17: {"ID":17,"story":"Because of the magnitude of the quake, and the media attention on China, foreign nations and organizations immediately responded to the disaster by offering condolences and assistance. On May 14, UNICEF reported that China formally requested the support of the international community to respond to the needs of affected families.","q1":"Following the 2008 Sichuan earthquake, foreign nations offered China both condolences and material assistance. (True/False?)","a1":true,"q2":"UNICEF","a2":true},
        18: {"ID":18,"story":"In January 2010, Hong Kong-based English newspaper The Standard reported that writer Tan Zuoren attempted to document shoddy construction that may have led to massive casualties in schools, was sentenced to in prison ostensibly for his writing an article in 2007 in support of the pro-democracy movement in 1989.","q1":"Tan Zuoren was sentenced to prison explicitly because of his investigation into poor school construction following the Sichuan earthquake. (True/False?)","a1":false,"q2":"journalist","a2":false},
        19: {"ID":19,"story":"Towards the end of the season, Randy Jackson, the last remaining of the original judges, announced that he would no longer serve as a judge to pursue other business ventures. Both judges Mariah Carey and Nicki Minaj also decided to leave after one season to focus on their music careers.","q1":"Mariah Carey served as an American Idol judge for multiple seasons before leaving to focus on her music career. (True/False?)","a1":false,"q2":"ratings","a2":false},
        20: {"ID":20,"story":"For Ruskin, the aesthetic was of overriding significance. His work goes on to state that a building is not truly a work of architecture unless it is in some way \"adorned\". For Ruskin, a well-constructed, well-proportioned, functional building needed string courses or rustication, at the very least.","q1":"According to Ruskin, a building must be adorned in some way to truly qualify as a work of architecture. (True/False?)","a1":true,"q2":"adorned","a2":true},
        21: {"ID":21,"story":"LE: Life expectancy at birth\nMYS: Mean years of schooling (Years that a person 25 years-of-age or older has spent in schools)\nEYS: Expected years of schooling (Years that a 5-year-old child will spend in schools throughout his life)\nGNIpc: Gross national income at purchasing power parity per capita","q1":"In the Human Development Index, GNIpc stands for gross national income measured at purchasing power parity per capita. (True/False?)","a1":true,"q2":"inequality","a2":false},
        22: {"ID":22,"story":"Paper is a thin material produced by pressing together moist fibres of cellulose pulp derived from wood, rags or grasses, and drying them into flexible sheets. It is a versatile material with many uses, including writing, printing, packaging, cleaning, and a number of industrial and construction processes.","q1":"Paper is made by pressing moist cellulose fibers together and then heating them to form rigid sheets. (True/False?)","a1":false,"q2":"bleach","a2":false},
        23: {"ID":23,"story":"The prefix neo is used to describe a 20th-century or contemporary composition written in the style of an earlier era, such as Classical or Romantic. Stravinsky's Pulcinella, for example, is a neoclassical composition because it is stylistically similar to works of the Classical era.","q1":"Stravinsky's Pulcinella is classified as neoclassical because it stylistically resembles compositions of the Romantic era. (True/False?)","a1":false,"q2":"symphony","a2":false},
        24: {"ID":24,"story":"On Children's Day, June 1, 2008, many parents went to the rubble of schools to mourn for their children. The surviving children, who were mostly living in relief centres, performed ceremonies marking the special day, but also acknowledging the earthquake.","q1":"On Children's Day 2008, most surviving children from the Sichuan earthquake were living in relief centres. (True/False?)","a1":true,"q2":"rubble","a2":true},
        25: {"ID":25,"story":"Most of Nanjing's major theatres are multi-purpose, used as convention halls, cinemas, musical halls and theatres on different occasions. The major theatres include the People's Convention Hall and the Nanjing Arts and Culture Center. The Capital Theatre well known in the past is now a museum in theatre/film.","q1":"The Capital Theatre in Nanjing continues to operate as an active performing arts venue today. (True/False?)","a1":false,"q2":"opera","a2":false},
        26: {"ID":26,"story":"What is known in Iranian linguistic history as the \"Middle Iranian\" era is thought to begin around the 4th century BCE lasting through the 9th century. Linguistically the Middle Iranian languages are conventionally classified into two main groups, Western and Eastern.","q1":"Middle Iranian languages are conventionally classified into Northern and Southern branches. (True/False?)","a1":false,"q2":"dialect","a2":false},
        27: {"ID":27,"story":"155th Street is a major crosstown street considered to form the boundary between Harlem and Washington Heights. It is the northernmost of the 155 crosstown streets mapped out in the Commissioner's Plan of 1811 that established the numbered street grid in Manhattan.","q1":"Manhattan's numbered street grid was established by the Commissioner's Plan of 1811. (True/False?)","a1":true,"q2":"boundary","a2":true},
        28: {"ID":28,"story":"If a party has materially violated or breached its treaty obligations, the other parties may invoke this breach as grounds for temporarily suspending their obligations to that party under the treaty. A material breach may also be invoked as grounds for permanently terminating the treaty itself.","q1":"Under international law, a material breach of treaty obligations can only justify the temporary suspension of other parties' obligations, not the permanent termination of the treaty. (True/False?)","a1":false,"q2":"arbitration","a2":false},
        29: {"ID":29,"story":"East 1st Street begins just North of East Houston Street at Avenue A and continues to Bowery. Peretz Square, a small triangular sliver park where Houston Street, First Street and First Avenue meet marks the spot where the grid takes hold.","q1":"Peretz Square, located where Houston Street, First Street, and First Avenue converge, is a circular park. (True/False?)","a1":false,"q2":"triangular","a2":true},

        40: {"ID":40,"story":"Schools called \"technical institute\" or \"technical school\" that were formed in the early 20th century provided further education between high school and University or Polytechnic. Most technical institutes have been merged into regional colleges and some have been designated university colleges if they are associated with a local university.","q1":"Technical institutes that merged into regional colleges were automatically redesignated as university colleges. (True/False?)","a1":false,"q2":"curriculum","a2":false}
    };

    var TOTAL = Object.keys(STIMULI).length;
    var PAGE_SIZE = 20;

    /* Cache client IP once — reused on every rating submission */
    var _clientIP = 'unknown';
    fetch('https://api64.ipify.org?format=json')
        .then(function (r) { return r.json(); })
        .then(function (d) { _clientIP = d.ip || 'unknown'; })
        .catch(function () {});
    /* Single mutable object shared by all star-widget closures */
    var pending = { story: 0, q1: 0, q2: 0 };
    var currentId = 1;
    var currentPage = 1;

    /* ------------------------------------------------------------------ */
    /* localStorage helpers                                                 */
    /* ------------------------------------------------------------------ */
    function getAllRatings() {
        try { return JSON.parse(localStorage.getItem('stimuliRatings') || '{}'); }
        catch (e) { return {}; }
    }

    function getRatingsFor(id) {
        var all = getAllRatings();
        var r = all[String(id)] || {};
        return { story: r.story || [], q1: r.q1 || [], q2: r.q2 || [] };
    }

    function submitRating(id, sv, q1v, q2v) {
        var all = getAllRatings();
        var key = String(id);
        if (!all[key]) all[key] = { story: [], q1: [], q2: [] };
        ['story', 'q1', 'q2'].forEach(function (k) { if (!all[key][k]) all[key][k] = []; });
        all[key].story.push(sv);
        all[key].q1.push(q1v);
        all[key].q2.push(q2v);
        localStorage.setItem('stimuliRatings', JSON.stringify(all));

        /* Fire-and-forget: save to Supabase (independent of localStorage) */
        if (RATING_SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            fetch(RATING_SUPABASE_URL + '/rest/v1/' + RATING_TABLE, {
                method: 'POST',
                headers: {
                    'Content-Type':  'application/json',
                    'apikey':         RATING_SUPABASE_KEY,
                    'Authorization': 'Bearer ' + RATING_SUPABASE_KEY,
                    'Prefer':        'return=minimal'
                },
                body: JSON.stringify({
                    ip_address:  _clientIP,
                    stimulus_id: id,
                    story:       sv,
                    q1:          q1v,
                    q2:          q2v
                })
            }).catch(function (e) { console.warn('Supabase save failed:', e); });
        }
    }

    function isRated(id) {
        var r = getRatingsFor(id);
        return r.story.length > 0 || r.q1.length > 0 || r.q2.length > 0;
    }

    /* Average of all ratings across all three categories for one stimulus */
    function getOverallAvg(id) {
        var r = getRatingsFor(id);
        var all = r.story.concat(r.q1).concat(r.q2);
        if (all.length === 0) return null;
        return all.reduce(function (a, b) { return a + b; }, 0) / all.length;
    }

    /* Map average 1-5 to a color */
    function avgToColor(avg) {
        if (avg === null) return null;
        if (avg >= 4)   return '#16a34a'; /* green  */
        if (avg >= 3)   return '#ca8a04'; /* amber  */
        if (avg >= 2)   return '#ea580c'; /* orange */
        return '#dc2626';                 /* red    */
    }

    function totalPages() {
        return Math.ceil(TOTAL / PAGE_SIZE);
    }

    /* ------------------------------------------------------------------ */
    /* Sidebar ID list + page navigation                                    */
    /* ------------------------------------------------------------------ */
    function buildIdList() {
        var tp = totalPages();
        var startIdx = (currentPage - 1) * PAGE_SIZE + 1;
        var endIdx   = Math.min(currentPage * PAGE_SIZE, TOTAL);

        /* Update page indicator and page nav buttons */
        document.getElementById('page-indicator').textContent =
            'Page ' + currentPage + ' / ' + tp;
        document.getElementById('page-prev-btn').disabled = currentPage <= 1;
        document.getElementById('page-next-btn').disabled = currentPage >= tp;

        /* Build the visible items */
        var list = document.getElementById('id-list');
        list.innerHTML = '';
        for (var i = startIdx; i <= endIdx; i++) {
            (function (id) {
                var item = document.createElement('div');
                item.className = 'id-item' + (id === currentId ? ' active' : '');
                item.dataset.id = id;

                var span = document.createElement('span');
                span.textContent = 'Stimulus #' + id;

                /* Color by average naturalness */
                var avg = getOverallAvg(id);
                var color = avgToColor(avg);
                if (color) {
                    span.style.color = color;
                    if (id === currentId) item.style.borderLeftColor = color;
                }

                item.appendChild(span);

                if (isRated(id)) {
                    var dot = document.createElement('span');
                    dot.className = 'rated-dot';
                    if (color) dot.style.background = color;
                    dot.title = avg !== null
                        ? 'Avg naturalness: ' + avg.toFixed(2)
                        : 'Has ratings';
                    item.appendChild(dot);
                }

                item.addEventListener('click', function () { goTo(id); });
                list.appendChild(item);
            })(i);
        }

        var active = list.querySelector('.id-item.active');
        if (active) active.scrollIntoView({ block: 'nearest' });
    }

    /* ------------------------------------------------------------------ */
    /* Nav buttons                                                          */
    /* ------------------------------------------------------------------ */
    function updateNavBtns() {
        document.getElementById('prev-btn').disabled = currentId <= 1;
        document.getElementById('next-btn').disabled = currentId >= TOTAL;
    }

    document.getElementById('prev-btn').addEventListener('click', function () {
        if (currentId > 1) goTo(currentId - 1);
    });
    document.getElementById('next-btn').addEventListener('click', function () {
        if (currentId < TOTAL) goTo(currentId + 1);
    });

    document.getElementById('page-prev-btn').addEventListener('click', function () {
        if (currentPage > 1) { currentPage--; buildIdList(); }
    });
    document.getElementById('page-next-btn').addEventListener('click', function () {
        if (currentPage < totalPages()) { currentPage++; buildIdList(); }
    });

    /* ------------------------------------------------------------------ */
    /* Star widget                                                          */
    /* ------------------------------------------------------------------ */
    var LABELS = { story: 'Passage Naturalness', q1: 'Q1 Naturalness', q2: 'Q2 Naturalness' };

    function makeStarWidget(key) {
        var row = document.createElement('div');
        row.className = 'rating-row';

        var lbl = document.createElement('div');
        lbl.className = 'rating-lbl';
        lbl.textContent = LABELS[key];

        var starsEl = document.createElement('div');
        starsEl.className = 'stars';

        var valEl = document.createElement('div');
        valEl.className = 'rating-val';
        valEl.textContent = '\u2014';

        function refresh(hoverIdx) {
            var display = (hoverIdx !== undefined) ? hoverIdx : pending[key];
            starsEl.querySelectorAll('.star').forEach(function (s) {
                s.classList.toggle('lit', parseInt(s.dataset.val, 10) <= display);
            });
        }

        for (var i = 1; i <= 5; i++) {
            (function (val) {
                var s = document.createElement('span');
                s.className = 'star';
                s.dataset.val = val;
                s.textContent = '\u2605';
                s.title = val + ' / 5';
                s.addEventListener('mouseenter', function () { refresh(val); });
                s.addEventListener('mouseleave', function () { refresh(); });
                s.addEventListener('click', function () {
                    pending[key] = val;
                    refresh();
                    valEl.textContent = val + ' / 5';
                    checkSubmit();
                });
                starsEl.appendChild(s);
            })(i);
        }

        row.appendChild(lbl);
        row.appendChild(starsEl);
        row.appendChild(valEl);
        return row;
    }

    function checkSubmit() {
        var btn = document.getElementById('submit-btn');
        if (btn) btn.disabled = !(pending.story && pending.q1 && pending.q2);
    }

    /* ------------------------------------------------------------------ */
    /* History panel                                                        */
    /* ------------------------------------------------------------------ */
    function renderHistory() {
        var el = document.getElementById('hist-content');
        if (!el) return;

        var r = getRatingsFor(currentId);
        var cats = [
            { key: 'story', label: 'Passage Naturalness' },
            { key: 'q1',    label: 'Q1 Naturalness' },
            { key: 'q2',    label: 'Q2 Naturalness' }
        ];
        var hasData = cats.some(function (c) { return r[c.key].length > 0; });

        if (!hasData) {
            el.innerHTML = '<p class="hist-empty">No ratings yet for this stimulus \u2014 be the first to rate it!</p>';
            return;
        }

        var grid = document.createElement('div');
        grid.className = 'hist-grid';

        cats.forEach(function (cat) {
            var vals = r[cat.key];
            var item = document.createElement('div');
            item.className = 'hist-item';

            var title = document.createElement('div');
            title.className = 'hist-item-title';
            title.textContent = cat.label;
            item.appendChild(title);

            if (vals.length === 0) {
                var emp = document.createElement('p');
                emp.className = 'hist-empty';
                emp.textContent = 'No ratings yet';
                item.appendChild(emp);
                grid.appendChild(item);
                return;
            }

            var mean = vals.reduce(function (a, b) { return a + b; }, 0) / vals.length;

            /* Average */
            var avgRow = document.createElement('div');
            avgRow.className = 'hist-avg';
            var avgVal = document.createElement('div');
            avgVal.className = 'hist-avg-val';
            avgVal.textContent = mean.toFixed(2);
            var avgMax = document.createElement('div');
            avgMax.className = 'hist-avg-max';
            avgMax.textContent = '/ 5';
            avgRow.appendChild(avgVal);
            avgRow.appendChild(avgMax);
            item.appendChild(avgRow);

            /* Count */
            var cnt = document.createElement('div');
            cnt.className = 'hist-count';
            cnt.textContent = vals.length + ' rating' + (vals.length !== 1 ? 's' : '');
            item.appendChild(cnt);

            /* Visual stars for average */
            var starRow = document.createElement('div');
            starRow.className = 'hist-stars-row';
            for (var s = 1; s <= 5; s++) {
                var st = document.createElement('span');
                st.className = 'hist-star' + (s <= Math.round(mean) ? ' lit' : '');
                st.textContent = '\u2605';
                starRow.appendChild(st);
            }
            item.appendChild(starRow);

            /* Distribution */
            var dist = [0, 0, 0, 0, 0];
            vals.forEach(function (v) { if (v >= 1 && v <= 5) dist[v - 1]++; });
            var maxCnt = Math.max.apply(null, dist.concat([1]));

            var distribEl = document.createElement('div');
            distribEl.className = 'distrib';

            for (var star = 5; star >= 1; star--) {
                var dRow = document.createElement('div');
                dRow.className = 'distrib-row';

                var dLbl = document.createElement('span');
                dLbl.className = 'distrib-star-lbl';
                dLbl.textContent = star;

                var track = document.createElement('div');
                track.className = 'distrib-track';
                var fill = document.createElement('div');
                fill.className = 'distrib-fill';
                fill.style.width = (dist[star - 1] / maxCnt * 100) + '%';
                track.appendChild(fill);

                var n = document.createElement('span');
                n.className = 'distrib-n';
                n.textContent = dist[star - 1];

                dRow.appendChild(dLbl);
                dRow.appendChild(track);
                dRow.appendChild(n);
                distribEl.appendChild(dRow);
            }

            item.appendChild(distribEl);
            grid.appendChild(item);
        });

        el.innerHTML = '';
        el.appendChild(grid);
    }

    /* ------------------------------------------------------------------ */
    /* HTML escape                                                          */
    /* ------------------------------------------------------------------ */
    function esc(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    /* ------------------------------------------------------------------ */
    /* Render page for one stimulus                                         */
    /* ------------------------------------------------------------------ */
    function renderPage(data) {
        pending.story = 0; pending.q1 = 0; pending.q2 = 0;

        var main = document.getElementById('main');
        main.innerHTML = '';

        /* Header */
        var hdr = document.createElement('div');
        hdr.className = 'page-title';
        hdr.innerHTML = '<strong>Stimulus #' + data.ID + '</strong> &nbsp;of ' + TOTAL;
        main.appendChild(hdr);

        /* Stimulus card */
        var card = document.createElement('div');
        card.className = 'card';
        var ct = document.createElement('div');
        ct.className = 'card-title';
        ct.textContent = 'Stimulus Content';
        card.appendChild(ct);

        var passageSec = document.createElement('div');
        passageSec.className = 'stim-section';
        passageSec.innerHTML =
            '<div class="stim-label">Passage</div>' +
            '<div class="stim-text">' + esc(data.story) + '</div>';
        card.appendChild(passageSec);

        var q1Sec = document.createElement('div');
        q1Sec.className = 'stim-section';
        q1Sec.innerHTML =
            '<div class="stim-label">Question 1</div>' +
            '<div class="stim-text">' + esc(data.q1) +
            '<span class="answer-badge ' + (data.a1 ? 'badge-t' : 'badge-f') + '">' +
            (data.a1 ? 'True' : 'False') + '</span></div>';
        card.appendChild(q1Sec);

        var q2Sec = document.createElement('div');
        q2Sec.className = 'stim-section';
        q2Sec.innerHTML =
            '<div class="stim-label">Question 2 \u2014 Target Word</div>' +
            '<div class="stim-text"><span class="target-word">' + esc(data.q2) + '</span>' +
            '<span class="word-meta ' + (data.a2 ? 'word-meta-present' : 'word-meta-absent') + '">' +
            (data.a2 ? '\u2713 appears in passage' : '\u2717 does not appear in passage') +
            '</span></div>';
        card.appendChild(q2Sec);
        main.appendChild(card);

        /* Rating card */
        var rCard = document.createElement('div');
        rCard.className = 'card';
        var rt = document.createElement('div');
        rt.className = 'card-title';
        rt.textContent = 'Rate Naturalness';
        rCard.appendChild(rt);

        var hint = document.createElement('div');
        hint.className = 'hint-text';
        hint.textContent = '1 = Very Unnatural \u00b7 2 = Unnatural \u00b7 3 = Neutral \u00b7 4 = Natural \u00b7 5 = Very Natural';
        rCard.appendChild(hint);

        var rows = document.createElement('div');
        rows.className = 'rating-rows';
        ['story', 'q1', 'q2'].forEach(function (k) { rows.appendChild(makeStarWidget(k)); });
        rCard.appendChild(rows);

        var submitBtn = document.createElement('button');
        submitBtn.className = 'submit-btn';
        submitBtn.id = 'submit-btn';
        submitBtn.textContent = 'Submit Rating';
        submitBtn.disabled = true;

        var submitMsg = document.createElement('div');
        submitMsg.className = 'submit-msg';
        submitMsg.id = 'submit-msg';

        submitBtn.addEventListener('click', function () {
            if (!pending.story || !pending.q1 || !pending.q2) return;
            submitRating(currentId, pending.story, pending.q1, pending.q2);
            submitMsg.textContent = '\u2713 Rating submitted!';
            setTimeout(function () { submitMsg.textContent = ''; }, 3000);
            pending.story = 0; pending.q1 = 0; pending.q2 = 0;
            document.querySelectorAll('.stars .star').forEach(function (s) { s.classList.remove('lit'); });
            document.querySelectorAll('.rating-val').forEach(function (v) { v.textContent = '\u2014'; });
            submitBtn.disabled = true;
            renderHistory();
            buildIdList();
        });

        rCard.appendChild(submitBtn);
        rCard.appendChild(submitMsg);
        main.appendChild(rCard);

        /* History card */
        var hCard = document.createElement('div');
        hCard.className = 'card';
        var ht = document.createElement('div');
        ht.className = 'card-title';
        ht.textContent = 'Rating History \u2014 Stimulus #' + data.ID;
        hCard.appendChild(ht);
        var hContent = document.createElement('div');
        hContent.id = 'hist-content';
        hCard.appendChild(hContent);
        main.appendChild(hCard);

        renderHistory();
        main.scrollTop = 0;
    }

    /* ------------------------------------------------------------------ */
    /* Navigation                                                           */
    /* ------------------------------------------------------------------ */
    function goTo(id) {
        currentId = id;
        /* Auto-switch sidebar page so the active item is always visible */
        currentPage = Math.ceil(id / PAGE_SIZE);
        history.replaceState(null, '', '#' + id);
        updateNavBtns();
        buildIdList();
        renderPage(STIMULI[id]);
    }

    /* Arrow-key navigation */
    document.addEventListener('keydown', function (e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowLeft'  && currentId > 1)     goTo(currentId - 1);
        if (e.key === 'ArrowRight' && currentId < TOTAL) goTo(currentId + 1);
    });

    /* ------------------------------------------------------------------ */
    /* Clear all ratings                                                    */
    /* ------------------------------------------------------------------ */
    document.getElementById('clear-btn').addEventListener('click', function () {
        if (!confirm('Clear ALL rating history? This cannot be undone.')) return;
        localStorage.removeItem('stimuliRatings');
        buildIdList();          /* refresh sidebar colors/dots */
        renderHistory();        /* refresh history panel       */
    });

    /* ------------------------------------------------------------------ */
    /* Init                                                                 */
    /* ------------------------------------------------------------------ */
    var hash = parseInt(window.location.hash.slice(1), 10);
    var startId = (hash >= 1 && hash <= TOTAL) ? hash : 1;
    updateNavBtns();
    buildIdList();
    goTo(startId);

})();
</script>
